name: deploy

on:
  push:
    branches:
      - main
      - master

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist --optimize-autoloader
          npm ci

      - name: Copy environment
        run: cp .env.example .env && php artisan key:generate

      - name: Build assets
        run: npm run build

      - name: Run tests
        run: ./vendor/bin/pest --compact

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install dependencies
        run: |
          composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
          npm install

      - name: Run Pint (check only)
        run: vendor/bin/pint --test

      - name: Lint frontend
        run: npm run lint

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, lint]
    environment: production
    concurrency:
      group: production
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_HOST }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.REGISTRY_HOST }}/aria:latest
            ${{ secrets.REGISTRY_HOST }}/aria:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.REGISTRY_HOST }}/aria:cache
          cache-to: type=registry,ref=${{ secrets.REGISTRY_HOST }}/aria:cache,mode=max

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/aria
            export TAG=${{ github.sha }}
            export REGISTRY="${{ secrets.REGISTRY_HOST }}/"
            docker pull ${REGISTRY}aria:${TAG}
            docker stack deploy -c docker-stack.yml aria --with-registry-auth
            echo "Waiting for rollout (30s)..."
            sleep 30
            docker service ls --filter name=aria_aria

      - name: Verify deployment health
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            for i in $(seq 1 6); do
              if curl -sf https://agent.promithic.com.br/up > /dev/null 2>&1; then
                echo "Health check passed on attempt $i"
                exit 0
              fi
              echo "Attempt $i failed, retrying in 10s..."
              sleep 10
            done
            echo "Health checks failed — rolling back"
            docker service rollback aria_aria
            exit 1

      - name: Notify on failure
        if: failure()
        run: echo "::error::Deployment failed for commit ${{ github.sha }}"
