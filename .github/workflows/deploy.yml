name: deploy

on:
  push:
    branches:
      - main
      - master

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist --optimize-autoloader
          npm ci

      - name: Copy environment
        run: cp .env.example .env && php artisan key:generate

      - name: Build assets
        run: npm run build

      - name: Run tests
        run: ./vendor/bin/pest --compact

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install dependencies
        run: |
          composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
          npm install

      - name: Run Pint (check only)
        run: vendor/bin/pint --test

      - name: Lint frontend
        run: npm run lint

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, lint]
    environment: production
    concurrency:
      group: production
      cancel-in-progress: false

    steps:
      # Single deploy path: SSH into the VPS and run deploy.sh, which pulls
      # main, builds the app + landing images, deploys the Swarm stack, and
      # runs migrations. Swarm update_config.failure_action handles rollback.
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            cd /srv/tenaz
            git pull origin main
            bash deploy.sh

      - name: Verify deployment health
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            ok=0
            for i in $(seq 1 6); do
              if curl -sf https://app.tenazcrm.com.br/up > /dev/null 2>&1; then
                echo "App health check passed on attempt $i"
                ok=1
                break
              fi
              echo "App attempt $i failed, retrying in 10s..."
              sleep 10
            done
            if [ "$ok" -ne 1 ]; then
              echo "App health checks failed"
              exit 1
            fi
            if curl -sf -o /dev/null https://tenazcrm.com.br/; then
              echo "Landing health check passed"
            else
              echo "Landing health check failed"
              exit 1
            fi

      - name: Notify on failure
        if: failure()
        run: echo "::error::Deployment failed for commit ${{ github.sha }}"
