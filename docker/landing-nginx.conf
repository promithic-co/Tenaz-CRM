server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    index index.html;

    # Clean URLs — landing links use /politica and /termos
    location = /politica {
        try_files /privacy.html =404;
    }

    location = /termos {
        try_files /terms.html =404;
    }

    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    location ~ /\. {
        deny all;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml application/json;
}
