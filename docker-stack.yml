version: '3.8'

services:
  tenaz:
    # Image must be built first: docker build -t tenaz:latest . (see deploy.sh)
    image: ${REGISTRY:-}tenaz:${TAG:-latest}
    # Env vars are expanded by deploy.sh (exports from .env before running this)

    environment:
      APP_NAME: "${APP_NAME:-Tenaz CRM}"
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_URL: ${APP_URL:-https://app.tenazcrm.com.br}
      APP_KEY: ${APP_KEY}
      ASSET_URL: ${ASSET_URL:-https://app.tenazcrm.com.br}
      APP_LOCALE: ${APP_LOCALE:-pt_BR}
      APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE:-pt_BR}
      APP_FAKER_LOCALE: ${APP_FAKER_LOCALE:-pt_BR}
      APP_MAINTENANCE_DRIVER: ${APP_MAINTENANCE_DRIVER:-file}
      APP_MAINTENANCE_STORE: ${APP_MAINTENANCE_STORE:-database}
      APP_PREVIOUS_KEYS: ${APP_PREVIOUS_KEYS:-}
      APP_BUILD_SHA: ${APP_BUILD_SHA:-}
      APP_BUILD_TAG: ${APP_BUILD_TAG:-}
      APP_BUILD_TIME: ${APP_BUILD_TIME:-}
      APP_VERSION_TOKEN: ${APP_VERSION_TOKEN:-}
      TENAZ_ADMIN_EMAILS: ${TENAZ_ADMIN_EMAILS:-}
      CREDFLOW_ADMIN_EMAILS: ${CREDFLOW_ADMIN_EMAILS:-}

      DB_CONNECTION: pgsql
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}

      REDIS_CLIENT: predis
      # Must be Redis service name on Swarm (not 127.0.0.1 from .env)
      REDIS_HOST: redis_redis
      REDIS_PORT: "6379"

      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      COHERE_API_KEY: ${COHERE_API_KEY:-}
      JINA_API_KEY: ${JINA_API_KEY:-}
      VOYAGEAI_API_KEY: ${VOYAGEAI_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://localhost:11434}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_URL: ${AZURE_OPENAI_URL:-}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-10-21}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-gpt-4o}
      AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${AZURE_OPENAI_EMBEDDING_DEPLOYMENT:-text-embedding-3-small}

      TENAZ_API_KEY: ${TENAZ_API_KEY:-}
      TENAZ_DEFAULT_TENANT_ID: ${TENAZ_DEFAULT_TENANT_ID:-default}
      TENAZ_API_KEYS: ${TENAZ_API_KEYS:-}
      CREDFLOW_API_KEY: ${CREDFLOW_API_KEY:-}
      ARIA_API_KEY: ${ARIA_API_KEY:-}

      TENAZ_AGENT_FALLBACK_PROVIDER: ${TENAZ_AGENT_FALLBACK_PROVIDER:-openrouter}
      TENAZ_AGENT_FALLBACK_MODEL: ${TENAZ_AGENT_FALLBACK_MODEL:-anthropic/claude-haiku-4-5}
      TENAZ_AGENT_MAX_MESSAGES: ${TENAZ_AGENT_MAX_MESSAGES:-24}
      TENAZ_AGENT_TEMPERATURE: ${TENAZ_AGENT_TEMPERATURE:-0.4}
      TENAZ_AGENT_MAX_TOKENS: ${TENAZ_AGENT_MAX_TOKENS:-1024}
      TENAZ_AGENT_MAX_STEPS: ${TENAZ_AGENT_MAX_STEPS:-10}
      TENAZ_AGENT_MAX_TOTAL_STEPS: ${TENAZ_AGENT_MAX_TOTAL_STEPS:-12}
      TENAZ_AGENT_TIMEOUT_SECONDS: ${TENAZ_AGENT_TIMEOUT_SECONDS:-45}
      TENAZ_AGENT_ARCHITECTURE_VERSION: ${TENAZ_AGENT_ARCHITECTURE_VERSION:-legacy_prompt}
      TENAZ_AGENT_FAILOVER_ENABLED: ${TENAZ_AGENT_FAILOVER_ENABLED:-false}
      TENAZ_AGENT_FAILOVER_PROVIDER: ${TENAZ_AGENT_FAILOVER_PROVIDER:-}
      TENAZ_AGENT_FAILOVER_MODEL: ${TENAZ_AGENT_FAILOVER_MODEL:-}
      TENAZ_TOKEN_WARNING_PROMPT: ${TENAZ_TOKEN_WARNING_PROMPT:-3000}
      TENAZ_TOKEN_WARNING_TOTAL: ${TENAZ_TOKEN_WARNING_TOTAL:-4000}
      CREDFLOW_AGENT_FALLBACK_PROVIDER: ${CREDFLOW_AGENT_FALLBACK_PROVIDER:-openrouter}
      CREDFLOW_AGENT_FALLBACK_MODEL: ${CREDFLOW_AGENT_FALLBACK_MODEL:-anthropic/claude-haiku-4-5}
      CREDFLOW_AGENT_MAX_MESSAGES: ${CREDFLOW_AGENT_MAX_MESSAGES:-24}
      CREDFLOW_AGENT_TEMPERATURE: ${CREDFLOW_AGENT_TEMPERATURE:-0.4}
      CREDFLOW_AGENT_MAX_TOKENS: ${CREDFLOW_AGENT_MAX_TOKENS:-1024}
      CREDFLOW_AGENT_MAX_STEPS: ${CREDFLOW_AGENT_MAX_STEPS:-10}
      CREDFLOW_AGENT_MAX_TOTAL_STEPS: ${CREDFLOW_AGENT_MAX_TOTAL_STEPS:-12}
      CREDFLOW_AGENT_TIMEOUT_SECONDS: ${CREDFLOW_AGENT_TIMEOUT_SECONDS:-45}
      CREDFLOW_AGENT_ARCHITECTURE_VERSION: ${CREDFLOW_AGENT_ARCHITECTURE_VERSION:-legacy_prompt}
      CREDFLOW_TOKEN_WARNING_PROMPT: ${CREDFLOW_TOKEN_WARNING_PROMPT:-3000}
      CREDFLOW_TOKEN_WARNING_TOTAL: ${CREDFLOW_TOKEN_WARNING_TOTAL:-4000}

      META_APP_ID: ${META_APP_ID:-}
      META_APP_SECRET: ${META_APP_SECRET:-}
      META_WEBHOOK_VERIFY_TOKEN: ${META_WEBHOOK_VERIFY_TOKEN:-}
      META_APP_CONFIG_ID: ${META_APP_CONFIG_ID:-}
      META_APP_CONFIG_ID_COEXISTENCE: ${META_APP_CONFIG_ID_COEXISTENCE:-}
      META_GRAPH_API_VERSION: ${META_GRAPH_API_VERSION:-v23.0}
      TENAZ_WEBHOOK_CONSULTA: ${TENAZ_WEBHOOK_CONSULTA:-}
      TENAZ_WEBHOOK_CONSULTA_SIAPE: ${TENAZ_WEBHOOK_CONSULTA_SIAPE:-}
      TENAZ_WEBHOOK_ESCALAR: ${TENAZ_WEBHOOK_ESCALAR:-}
      TENAZ_WEBHOOK_REGISTRAR: ${TENAZ_WEBHOOK_REGISTRAR:-}
      CREDFLOW_WEBHOOK_CONSULTA: ${CREDFLOW_WEBHOOK_CONSULTA:-}
      CREDFLOW_WEBHOOK_CONSULTA_SIAPE: ${CREDFLOW_WEBHOOK_CONSULTA_SIAPE:-}
      CREDFLOW_WEBHOOK_ESCALAR: ${CREDFLOW_WEBHOOK_ESCALAR:-}
      CREDFLOW_WEBHOOK_REGISTRAR: ${CREDFLOW_WEBHOOK_REGISTRAR:-}
      ARIA_WEBHOOK_CONSULTA: ${ARIA_WEBHOOK_CONSULTA:-}
      ARIA_WEBHOOK_CONSULTA_SIAPE: ${ARIA_WEBHOOK_CONSULTA_SIAPE:-}
      ARIA_WEBHOOK_ESCALAR: ${ARIA_WEBHOOK_ESCALAR:-}
      ARIA_WEBHOOK_REGISTRAR: ${ARIA_WEBHOOK_REGISTRAR:-}

      PROMOSYS_BASE_URL: ${PROMOSYS_BASE_URL:-https://jcf.promosysweb.com/services}
      PROMOSYS_USUARIO: ${PROMOSYS_USUARIO:-}
      PROMOSYS_SENHA: ${PROMOSYS_SENHA:-}

      FOLLOWUP_FIRST_DELAY_MINUTES: ${FOLLOWUP_FIRST_DELAY_MINUTES:-10}
      FOLLOWUP_DAILY_TIME: ${FOLLOWUP_DAILY_TIME:-10:00}
      FOLLOWUP_MAX_COUNT: ${FOLLOWUP_MAX_COUNT:-4}
      FOLLOWUP_SKIP_IF_RECENT_INBOUND_MINUTES: ${FOLLOWUP_SKIP_IF_RECENT_INBOUND_MINUTES:-30}

      TENAZ_CIRCUIT_BREAKER_THRESHOLD: ${TENAZ_CIRCUIT_BREAKER_THRESHOLD:-5}
      TENAZ_CIRCUIT_BREAKER_WINDOW: ${TENAZ_CIRCUIT_BREAKER_WINDOW:-5}
      TENAZ_API_RATE_LIMIT: ${TENAZ_API_RATE_LIMIT:-120}
      TENAZ_RATE_LIMIT_PER_PHONE: ${TENAZ_RATE_LIMIT_PER_PHONE:-30}
      TENAZ_URA_KEY_LAST_USED_DEBOUNCE_SECONDS: ${TENAZ_URA_KEY_LAST_USED_DEBOUNCE_SECONDS:-300}
      CREDFLOW_CIRCUIT_BREAKER_THRESHOLD: ${CREDFLOW_CIRCUIT_BREAKER_THRESHOLD:-5}
      CREDFLOW_CIRCUIT_BREAKER_WINDOW: ${CREDFLOW_CIRCUIT_BREAKER_WINDOW:-5}
      CREDFLOW_API_RATE_LIMIT: ${CREDFLOW_API_RATE_LIMIT:-120}
      CREDFLOW_RATE_LIMIT_PER_PHONE: ${CREDFLOW_RATE_LIMIT_PER_PHONE:-30}
      CREDFLOW_URA_KEY_LAST_USED_DEBOUNCE_SECONDS: ${CREDFLOW_URA_KEY_LAST_USED_DEBOUNCE_SECONDS:-300}

      TENAZ_CAMPAIGN_RATE_PER_MINUTE: ${TENAZ_CAMPAIGN_RATE_PER_MINUTE:-80}
      TENAZ_CAMPAIGN_RATE_LIMIT_RELEASE: ${TENAZ_CAMPAIGN_RATE_LIMIT_RELEASE:-60}
      TENAZ_CAMPAIGN_AUTOPAUSE_DEBOUNCE: ${TENAZ_CAMPAIGN_AUTOPAUSE_DEBOUNCE:-3}
      TENAZ_CAMPAIGN_TENANT_RATE_PER_MINUTE: ${TENAZ_CAMPAIGN_TENANT_RATE_PER_MINUTE:-0}
      TENAZ_CAMPAIGN_SEND_RETRY_WINDOW: ${TENAZ_CAMPAIGN_SEND_RETRY_WINDOW:-21600}
      TENAZ_CAMPAIGN_SEND_CONFIG_CACHE: ${TENAZ_CAMPAIGN_SEND_CONFIG_CACHE:-300}
      TENAZ_CAMPAIGN_DISPATCH_MAX_REDISPATCH: ${TENAZ_CAMPAIGN_DISPATCH_MAX_REDISPATCH:-2}
      TENAZ_CAMPAIGN_DISPATCH_REDISPATCH_DELAY: ${TENAZ_CAMPAIGN_DISPATCH_REDISPATCH_DELAY:-10}
      TENAZ_CRON_DISPATCH_JITTER_SECONDS: ${TENAZ_CRON_DISPATCH_JITTER_SECONDS:-240}
      CREDFLOW_CAMPAIGN_RATE_PER_MINUTE: ${CREDFLOW_CAMPAIGN_RATE_PER_MINUTE:-80}
      CREDFLOW_CAMPAIGN_RATE_LIMIT_RELEASE: ${CREDFLOW_CAMPAIGN_RATE_LIMIT_RELEASE:-60}
      CREDFLOW_CAMPAIGN_AUTOPAUSE_DEBOUNCE: ${CREDFLOW_CAMPAIGN_AUTOPAUSE_DEBOUNCE:-3}
      CREDFLOW_CAMPAIGN_TENANT_RATE_PER_MINUTE: ${CREDFLOW_CAMPAIGN_TENANT_RATE_PER_MINUTE:-0}
      CREDFLOW_CAMPAIGN_SEND_RETRY_WINDOW: ${CREDFLOW_CAMPAIGN_SEND_RETRY_WINDOW:-21600}
      CREDFLOW_CAMPAIGN_SEND_CONFIG_CACHE: ${CREDFLOW_CAMPAIGN_SEND_CONFIG_CACHE:-300}
      CREDFLOW_CAMPAIGN_DISPATCH_MAX_REDISPATCH: ${CREDFLOW_CAMPAIGN_DISPATCH_MAX_REDISPATCH:-2}
      CREDFLOW_CAMPAIGN_DISPATCH_REDISPATCH_DELAY: ${CREDFLOW_CAMPAIGN_DISPATCH_REDISPATCH_DELAY:-10}
      CREDFLOW_CRON_DISPATCH_JITTER_SECONDS: ${CREDFLOW_CRON_DISPATCH_JITTER_SECONDS:-240}

      TENAZ_AUTO_TAG_RETRY_WINDOW_SECONDS: ${TENAZ_AUTO_TAG_RETRY_WINDOW_SECONDS:-1800}
      TENAZ_INCOMING_MESSAGE_RETRY_WINDOW_SECONDS: ${TENAZ_INCOMING_MESSAGE_RETRY_WINDOW_SECONDS:-1800}
      TENAZ_OUTBOX_RETRY_WINDOW_SECONDS: ${TENAZ_OUTBOX_RETRY_WINDOW_SECONDS:-21600}
      TENAZ_TEMPLATE_SYNC_RETRY_WINDOW_SECONDS: ${TENAZ_TEMPLATE_SYNC_RETRY_WINDOW_SECONDS:-3600}
      TENAZ_TEMPLATE_SYNC_MAX_RETRY_AFTER_SECONDS: ${TENAZ_TEMPLATE_SYNC_MAX_RETRY_AFTER_SECONDS:-3600}
      CREDFLOW_AUTO_TAG_RETRY_WINDOW_SECONDS: ${CREDFLOW_AUTO_TAG_RETRY_WINDOW_SECONDS:-1800}
      CREDFLOW_INCOMING_MESSAGE_RETRY_WINDOW_SECONDS: ${CREDFLOW_INCOMING_MESSAGE_RETRY_WINDOW_SECONDS:-1800}
      CREDFLOW_OUTBOX_RETRY_WINDOW_SECONDS: ${CREDFLOW_OUTBOX_RETRY_WINDOW_SECONDS:-21600}
      CREDFLOW_TEMPLATE_SYNC_RETRY_WINDOW_SECONDS: ${CREDFLOW_TEMPLATE_SYNC_RETRY_WINDOW_SECONDS:-3600}
      CREDFLOW_TEMPLATE_SYNC_MAX_RETRY_AFTER_SECONDS: ${CREDFLOW_TEMPLATE_SYNC_MAX_RETRY_AFTER_SECONDS:-3600}

      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: ${REVERB_APP_ID:-tenaz-crm}
      REVERB_APP_KEY: ${REVERB_APP_KEY}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      REVERB_HOST: "0.0.0.0"
      REVERB_PORT: "8080"
      REVERB_SCHEME: http

      SESSION_DRIVER: redis
      SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
      SESSION_ENCRYPT: ${SESSION_ENCRYPT:-true}
      SESSION_PATH: ${SESSION_PATH:-/}
      SESSION_DOMAIN: ${SESSION_DOMAIN:-}
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
      # Must be greater than the largest queue worker timeout to prevent Redis
      # from making still-running jobs visible a second time.
      REDIS_QUEUE_RETRY_AFTER: ${REDIS_QUEUE_RETRY_AFTER:-3900}

      MAIL_MAILER: ${MAIL_MAILER:-resend}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-tenaz@seudominio.com.br}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Tenaz CRM}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      POSTMARK_API_KEY: ${POSTMARK_API_KEY:-}

      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_BUCKET: ${AWS_BUCKET:-}
      AWS_URL: ${AWS_URL:-}
      AWS_ENDPOINT: ${AWS_ENDPOINT:-}
      AWS_USE_PATH_STYLE_ENDPOINT: ${AWS_USE_PATH_STYLE_ENDPOINT:-false}

      LANGFUSE_ENABLED: ${LANGFUSE_ENABLED:-false}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
      LANGFUSE_DASHBOARD_URL: ${LANGFUSE_DASHBOARD_URL:-}
      ALERT_ENABLED: ${ALERT_ENABLED:-false}
      ALERT_CHANNEL: ${ALERT_CHANNEL:-slack}
      SLACK_ALERT_WEBHOOK_URL: ${SLACK_ALERT_WEBHOOK_URL:-}
      STRESS_TEST_TIMEOUT: ${STRESS_TEST_TIMEOUT:-3600}
      TENAZ_DAILY_COST_ALERT_USD: ${TENAZ_DAILY_COST_ALERT_USD:-10}
      CREDFLOW_DAILY_COST_ALERT_USD: ${CREDFLOW_DAILY_COST_ALERT_USD:-10}

      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      URA_API_KEY: ${URA_API_KEY:-}
      GOOGLE_TTS_API_KEY: ${GOOGLE_TTS_API_KEY:-}

      DEBOUNCE_SECONDS: ${DEBOUNCE_SECONDS:-3}
      LOG_CHANNEL: stderr
      LOG_LEVEL: ${LOG_LEVEL:-info}

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    networks:
      - network_public

    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 30s
        # stop-first: replace one replica at a time WITHOUT needing a temporary
        # extra container. start-first needed replicas+1 running at once, which
        # the node could not fit (memory) -> new task stuck Pending, old image
        # kept serving. stop-first trades a brief per-replica blip for schedulability.
        order: stop-first
        failure_action: rollback
        monitor: 60s
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=network_public"

        # HTTP → HTTPS redirect
        - "traefik.http.routers.tenaz-http.rule=Host(`app.tenazcrm.com.br`)"
        - "traefik.http.routers.tenaz-http.entrypoints=web"
        - "traefik.http.routers.tenaz-http.middlewares=redirect-to-https"

        # HTTPS
        - "traefik.http.routers.tenaz.rule=Host(`app.tenazcrm.com.br`)"
        - "traefik.http.routers.tenaz.entrypoints=websecure"
        - "traefik.http.routers.tenaz.tls=true"
        - "traefik.http.routers.tenaz.tls.certresolver=letsencryptresolver"

        # Health check
        - "traefik.http.services.tenaz.loadbalancer.server.port=80"
        - "traefik.http.services.tenaz.loadbalancer.healthcheck.path=/up"
        - "traefik.http.services.tenaz.loadbalancer.healthcheck.interval=30s"

        # Sticky sessions for WebSocket (Reverb) compatibility
        - "traefik.http.services.tenaz.loadbalancer.sticky.cookie=true"
        - "traefik.http.services.tenaz.loadbalancer.sticky.cookie.name=tenaz_srv"
        - "traefik.http.services.tenaz.loadbalancer.sticky.cookie.secure=true"
        - "traefik.http.services.tenaz.loadbalancer.sticky.cookie.httponly=true"

  landing:
    # Static marketing site (landing/). Built by deploy.sh: docker build -t tenaz-landing:latest -f docker/landing.Dockerfile .
    image: ${REGISTRY:-}tenaz-landing:${TAG:-latest}

    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    networks:
      - network_public

    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 15s
        order: start-first
        failure_action: rollback
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=network_public"

        # www → apex redirect (301)
        - "traefik.http.middlewares.landing-www-to-apex.redirectregex.regex=^https?://www\\.tenazcrm\\.com\\.br/(.*)"
        - "traefik.http.middlewares.landing-www-to-apex.redirectregex.replacement=https://tenazcrm.com.br/$${1}"
        - "traefik.http.middlewares.landing-www-to-apex.redirectregex.permanent=true"

        # HTTP → HTTPS redirect (apex + www)
        - "traefik.http.routers.landing-http.rule=Host(`tenazcrm.com.br`) || Host(`www.tenazcrm.com.br`)"
        - "traefik.http.routers.landing-http.entrypoints=web"
        - "traefik.http.routers.landing-http.middlewares=redirect-to-https"

        # HTTPS
        - "traefik.http.routers.landing.rule=Host(`tenazcrm.com.br`) || Host(`www.tenazcrm.com.br`)"
        - "traefik.http.routers.landing.entrypoints=websecure"
        - "traefik.http.routers.landing.tls=true"
        - "traefik.http.routers.landing.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.landing.middlewares=landing-www-to-apex"

        - "traefik.http.services.landing.loadbalancer.server.port=80"

networks:
  network_public:
    external: true
